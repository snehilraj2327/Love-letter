v<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
    background: black;
}

/* Background blur */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.1);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    z-index: 2;
    transition: 0.5s;
}

.card.hide {
    opacity: 0;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #ff4b5c;
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

/* Sparks */
.spark {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold, 0 0 20px gold;
    animation: move 1s linear forwards;
}

@keyframes move {
    from {
        transform: translate(0,0);
        opacity: 1;
    }
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

/* Love Letter */
#letter {
    position: fixed;
    width: 90%;
    max-width: 600px;
    opacity: 0;
    transform: scale(0.5);
    transition: 0.8s ease;
    z-index: 5;
}

#letter.show {
    opacity: 1;
    transform: scale(1);
}
</style>

</head>

<body>

<div class="card" id="card">
    <h1>Hey ❤️</h1>
    <p>Today is our first meet-up... and it already feels special.</p>
    <button onclick="blast()">Click me 😊</button>
</div>

<!-- Replace with your letter -->
<img id="letter" src="https://i.imgur.com/8Km9tLL.png">

<script>
function blast() {

    // hide card
    document.getElementById("card").classList.add("hide");

    // create sparks (WORKING LOGIC)
    for (let i = 0; i < 80; i++) {
        let s = document.createElement("div");
        s.className = "spark";

        let x = (Math.random() - 0.5) * window.innerWidth + "px";
        let y = (Math.random() - 0.5) * window.innerHeight + "px";

        s.style.setProperty("--x", x);
        s.style.setProperty("--y", y);

        document.body.appendChild(s);

        setTimeout(() => s.remove(), 1000);
    }

    // show letter
    setTimeout(() => {
        document.getElementById("letter").classList.add("show");
    }, 500);
}
</script>

</body>
</html>
